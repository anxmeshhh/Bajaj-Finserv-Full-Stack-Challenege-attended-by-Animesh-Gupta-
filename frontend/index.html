<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFHL Hierarchy Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .glass-panel {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #e2e8f0;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            color: var(--text-main);
            font-size: 14px;
            font-family: monospace;
            resize: vertical;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn-analyze {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6);
        }

        .btn-analyze:active {
            transform: translateY(0);
        }

        /* Results Section */
        .results-container {
            margin-top: 40px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .info-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .info-badge span {
            color: var(--text-muted);
            margin-right: 5px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .summary-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .summary-card h3 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .summary-card.cycles h3 { color: var(--warning); }
        .summary-card.root h3 { color: var(--secondary); font-size: 2rem; }

        .summary-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Tree Visualization */
        .section-title {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tree-container {
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .tree-node {
            margin-left: 20px;
            position: relative;
            padding-left: 20px;
            border-left: 2px solid var(--primary);
            margin-bottom: 10px;
        }

        .tree-node::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            width: 15px;
            height: 2px;
            background: var(--primary);
        }

        .node-label {
            display: inline-block;
            background: rgba(99, 102, 241, 0.2);
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: 600;
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
            margin-bottom: 5px;
        }

        .cycle-warning {
            color: var(--warning);
            font-size: 0.85rem;
            margin-left: 10px;
            display: inline-flex;
            align-items: center;
            background: rgba(245, 158, 11, 0.1);
            padding: 2px 8px;
            border-radius: 12px;
        }

        /* Chips for Arrays */
        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .chip.invalid {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .chip.duplicate {
            background: rgba(245, 158, 11, 0.1);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            margin-top: 20px;
            display: none;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
            color: var(--primary);
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="glass-panel">
            <div class="header">
                <h1>Hierarchy Analyzer</h1>
                <p>Process and visualize complex node relationships</p>
            </div>

            <div class="input-group">
                <label for="input">JSON Payload</label>
                <textarea id="input" spellcheck="false">
{
  "data": ["A->B", "A->C", "B->D", "C->E", "E->F", "X->Y", "Y->Z", "Z->X", "P->Q", "Q->R", "G->H", "G->H", "G->I", "hello", "1->2", "A->"]
}
                </textarea>
            </div>

            <button class="btn-analyze" onclick="sendData()" id="analyzeBtn">Analyze Hierarchy</button>
            <div id="loading" class="loading">Processing Data...</div>
            <div id="errorBox" class="error-message"></div>

            <div id="results" class="results-container">
                <div class="user-info" id="userInfo"></div>
                
                <h2 class="section-title">Analysis Summary</h2>
                <div class="summary-grid">
                    <div class="summary-card">
                        <h3 id="totalTrees">0</h3>
                        <p>Total Trees</p>
                    </div>
                    <div class="summary-card cycles">
                        <h3 id="totalCycles">0</h3>
                        <p>Cycles Detected</p>
                    </div>
                    <div class="summary-card root">
                        <h3 id="largestRoot">-</h3>
                        <p>Largest Tree Root</p>
                    </div>
                </div>

                <div id="invalidSection" style="display: none;">
                    <h2 class="section-title">Invalid Entries</h2>
                    <div class="chips-container" id="invalidChips"></div>
                </div>

                <div id="duplicateSection" style="display: none;">
                    <h2 class="section-title">Duplicate Edges</h2>
                    <div class="chips-container" id="duplicateChips"></div>
                </div>

                <h2 class="section-title">Hierarchies Visualized</h2>
                <div class="tree-container" id="treeContainer"></div>
            </div>
        </div>
    </div>

    <script>
        async function sendData() {
            const analyzeBtn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const errorBox = document.getElementById('errorBox');
            
            errorBox.style.display = 'none';
            results.style.display = 'none';
            loading.style.display = 'block';
            analyzeBtn.disabled = true;
            analyzeBtn.style.opacity = '0.7';

            try {
                const inputText = document.getElementById("input").value;
                const jsonData = JSON.parse(inputText);

                // Use the local or remote API URL depending on deployment. 
                // We use the local dev server if available, else the remote one.
                const apiUrl = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" 
                    ? "http://localhost:3000/bfhl" 
                    : "https://bfhl-api-animesh.onrender.com/bfhl";

                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(jsonData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to process data');
                }

                renderResults(data);

            } catch (error) {
                errorBox.innerHTML = `<strong>Error:</strong> ${error.message}`;
                errorBox.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                analyzeBtn.disabled = false;
                analyzeBtn.style.opacity = '1';
            }
        }

        function renderResults(data) {
            // User Info
            document.getElementById('userInfo').innerHTML = `
                <div class="info-badge"><span>User:</span> ${data.user_id}</div>
                <div class="info-badge"><span>Email:</span> ${data.email_id}</div>
                <div class="info-badge"><span>Roll No:</span> ${data.college_roll_number}</div>
            `;

            // Summary
            document.getElementById('totalTrees').textContent = data.summary.total_trees;
            document.getElementById('totalCycles').textContent = data.summary.total_cycles;
            document.getElementById('largestRoot').textContent = data.summary.largest_tree_root || 'N/A';

            // Invalid Entries
            const invalidSection = document.getElementById('invalidSection');
            const invalidChips = document.getElementById('invalidChips');
            if (data.invalid_entries && data.invalid_entries.length > 0) {
                invalidChips.innerHTML = data.invalid_entries.map(e => `<span class="chip invalid">${e}</span>`).join('');
                invalidSection.style.display = 'block';
            } else {
                invalidSection.style.display = 'none';
            }

            // Duplicate Edges
            const duplicateSection = document.getElementById('duplicateSection');
            const duplicateChips = document.getElementById('duplicateChips');
            if (data.duplicate_edges && data.duplicate_edges.length > 0) {
                duplicateChips.innerHTML = data.duplicate_edges.map(e => `<span class="chip duplicate">${e}</span>`).join('');
                duplicateSection.style.display = 'block';
            } else {
                duplicateSection.style.display = 'none';
            }

            // Trees
            const treeContainer = document.getElementById('treeContainer');
            treeContainer.innerHTML = '';
            
            if (data.hierarchies && data.hierarchies.length > 0) {
                data.hierarchies.forEach(hierarchy => {
                    const treeWrapper = document.createElement('div');
                    treeWrapper.style.marginBottom = '20px';
                    
                    let cycleHtml = hierarchy.has_cycle ? '<span class="cycle-warning">⚠️ Cyclic Group</span>' : `<span class="cycle-warning" style="color: #10b981; background: rgba(16,185,129,0.1)">Depth: ${hierarchy.depth}</span>`;
                    
                    let htmlStr = `<div class="node-label">${hierarchy.root}</div> ${cycleHtml}`;
                    htmlStr += renderTreeNodes(hierarchy.tree);
                    
                    treeWrapper.innerHTML = htmlStr;
                    treeContainer.appendChild(treeWrapper);
                });
            } else {
                treeContainer.innerHTML = '<p style="color: var(--text-muted)">No hierarchies found.</p>';
            }

            document.getElementById('results').style.display = 'block';
        }

        function renderTreeNodes(treeObj) {
            if (!treeObj || Object.keys(treeObj).length === 0) return '';
            
            let html = '';
            for (const key in treeObj) {
                html += `<div class="tree-node">
                    <span class="node-label" style="color: #e2e8f0; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2);">${key}</span>
                    ${renderTreeNodes(treeObj[key])}
                </div>`;
            }
            return html;
        }
    </script>
</body>
</html>
