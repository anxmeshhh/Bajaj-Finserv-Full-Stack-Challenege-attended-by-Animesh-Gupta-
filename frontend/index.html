<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFHL Hierarchy Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: #121212;
            --surface-hover: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #2a2a2a;
            --border-highlight: #555555;
            --accent: #ffffff;
            --accent-contrast: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        textarea {
            width: 100%;
            height: 120px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 15px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', monospace;
            resize: vertical;
            transition: all 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-analyze {
            display: inline-block;
            padding: 12px 30px;
            background: var(--bg-color);
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 0;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-analyze:hover {
            background: var(--accent);
            color: var(--accent-contrast);
        }

        .btn-analyze:active {
            transform: scale(0.98);
        }

        /* Results Section */
        .results-container {
            margin-top: 50px;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-top: 40px;
        }

        /* Grid for cards */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 4px;
            transition: border-color 0.2s ease;
        }

        .card:hover {
            border-color: var(--border-highlight);
        }

        .card-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 300;
        }

        .user-info {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            font-size: 0.85rem;
            border-radius: 4px;
        }

        .info-item span {
            color: var(--text-secondary);
            margin-right: 8px;
        }

        /* Tree Visualization */
        .tree-container {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 4px;
            overflow-x: auto;
        }

        .tree-node {
            margin-left: 20px;
            position: relative;
            padding-left: 20px;
            border-left: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .tree-node::before {
            content: '';
            position: absolute;
            left: 0;
            top: 14px;
            width: 15px;
            height: 1px;
            background: var(--border-color);
        }

        .node-label {
            display: inline-block;
            background: var(--bg-color);
            padding: 6px 14px;
            border: 1px solid var(--border-highlight);
            border-radius: 4px;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .cycle-warning, .depth-indicator {
            font-size: 0.75rem;
            margin-left: 10px;
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cycle-warning {
            border: 1px solid #777;
            color: #ccc;
        }

        .depth-indicator {
            border: 1px solid #555;
            color: #aaa;
        }

        /* Chips for Arrays */
        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .chip {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            background: var(--surface-color);
            font-size: 0.85rem;
            border-radius: 2px;
        }

        /* JSON Output */
        .json-container {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 4px;
            overflow-x: auto;
        }

        pre {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #dcdcdc;
            margin: 0;
        }

        .error-message {
            border-left: 3px solid #ff3333;
            background: var(--surface-color);
            padding: 15px;
            margin-top: 20px;
            display: none;
            font-size: 0.9rem;
        }

        .loading {
            margin-top: 20px;
            display: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>System Hierarchy Analysis</h1>
            <p>Process nodes and relational data natively</p>
        </div>

        <div class="input-group">
            <label for="input">JSON Payload / Data Input</label>
            <textarea id="input" spellcheck="false">
{
  "data": ["A->B", "A->C", "B->D", "C->E", "E->F", "X->Y", "Y->Z", "Z->X", "P->Q", "Q->R", "G->H", "G->H", "G->I", "hello", "1->2", "A->"]
}
            </textarea>
        </div>

        <button class="btn-analyze" onclick="sendData()" id="analyzeBtn">Process Data</button>
        <div id="loading" class="loading">Processing Request...</div>
        <div id="errorBox" class="error-message"></div>

        <div id="results" class="results-container">
            
            <div class="user-info" id="userInfo"></div>

            <h2 class="section-title">Analysis Overview</h2>
            <div class="grid-3">
                <div class="card">
                    <div class="card-label">Total Valid Trees</div>
                    <div class="card-value" id="totalTrees">0</div>
                </div>
                <div class="card">
                    <div class="card-label">Cycles Detected</div>
                    <div class="card-value" id="totalCycles">0</div>
                </div>
                <div class="card">
                    <div class="card-label">Largest Tree Root</div>
                    <div class="card-value" id="largestRoot">-</div>
                </div>
            </div>

            <div class="grid-3">
                <div id="invalidSection" class="card" style="display: none;">
                    <div class="card-label">Invalid Entries</div>
                    <div class="chips-container" id="invalidChips"></div>
                </div>
                <div id="duplicateSection" class="card" style="display: none;">
                    <div class="card-label">Duplicate Edges</div>
                    <div class="chips-container" id="duplicateChips"></div>
                </div>
            </div>

            <h2 class="section-title">Visual Hierarchy</h2>
            <div class="tree-container" id="treeContainer"></div>

            <h2 class="section-title">Raw JSON Response</h2>
            <div class="json-container">
                <pre id="jsonOutput"></pre>
            </div>

        </div>
    </div>

    <script>
        async function sendData() {
            const analyzeBtn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const errorBox = document.getElementById('errorBox');
            
            errorBox.style.display = 'none';
            results.style.display = 'none';
            loading.style.display = 'block';
            analyzeBtn.disabled = true;
            analyzeBtn.style.opacity = '0.5';

            try {
                const inputText = document.getElementById("input").value;
                const jsonData = JSON.parse(inputText);

                const apiUrl = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:"
                    ? "http://localhost:3000/bfhl" 
                    : "https://bfhl-api-animesh.onrender.com/bfhl";

                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(jsonData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to process data');
                }

                renderResults(data);

            } catch (error) {
                errorBox.innerHTML = `ERROR: ${error.message}`;
                errorBox.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                analyzeBtn.disabled = false;
                analyzeBtn.style.opacity = '1';
            }
        }

        function renderResults(data) {
            // User Info
            document.getElementById('userInfo').innerHTML = `
                <div class="info-item"><span>USER:</span> ${data.user_id}</div>
                <div class="info-item"><span>EMAIL:</span> ${data.email_id}</div>
                <div class="info-item"><span>ROLL:</span> ${data.college_roll_number}</div>
            `;

            // Summary
            document.getElementById('totalTrees').textContent = data.summary.total_trees;
            document.getElementById('totalCycles').textContent = data.summary.total_cycles;
            document.getElementById('largestRoot').textContent = data.summary.largest_tree_root || 'N/A';

            // Invalid Entries
            const invalidSection = document.getElementById('invalidSection');
            const invalidChips = document.getElementById('invalidChips');
            if (data.invalid_entries && data.invalid_entries.length > 0) {
                invalidChips.innerHTML = data.invalid_entries.map(e => `<span class="chip">${e}</span>`).join('');
                invalidSection.style.display = 'block';
            } else {
                invalidSection.style.display = 'none';
            }

            // Duplicate Edges
            const duplicateSection = document.getElementById('duplicateSection');
            const duplicateChips = document.getElementById('duplicateChips');
            if (data.duplicate_edges && data.duplicate_edges.length > 0) {
                duplicateChips.innerHTML = data.duplicate_edges.map(e => `<span class="chip">${e}</span>`).join('');
                duplicateSection.style.display = 'block';
            } else {
                duplicateSection.style.display = 'none';
            }

            // Trees
            const treeContainer = document.getElementById('treeContainer');
            treeContainer.innerHTML = '';
            
            if (data.hierarchies && data.hierarchies.length > 0) {
                data.hierarchies.forEach(hierarchy => {
                    const treeWrapper = document.createElement('div');
                    treeWrapper.style.marginBottom = '20px';
                    
                    let statusHtml = hierarchy.has_cycle 
                        ? '<span class="cycle-warning">Cyclic</span>' 
                        : `<span class="depth-indicator">Depth: ${hierarchy.depth}</span>`;
                    
                    let htmlStr = `<div class="node-label">${hierarchy.root}</div> ${statusHtml}`;
                    htmlStr += renderTreeNodes(hierarchy.tree);
                    
                    treeWrapper.innerHTML = htmlStr;
                    treeContainer.appendChild(treeWrapper);
                });
            } else {
                treeContainer.innerHTML = '<span style="color: var(--text-secondary)">No hierarchies found.</span>';
            }

            // Raw JSON Output
            document.getElementById('jsonOutput').textContent = JSON.stringify(data, null, 2);

            document.getElementById('results').style.display = 'block';
        }

        function renderTreeNodes(treeObj) {
            if (!treeObj || Object.keys(treeObj).length === 0) return '';
            
            let html = '';
            for (const key in treeObj) {
                html += `<div class="tree-node">
                    <span class="node-label">${key}</span>
                    ${renderTreeNodes(treeObj[key])}
                </div>`;
            }
            return html;
        }
    </script>
</body>
</html>
