<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BFHL Hierarchy Analyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .container {
            width: 800px;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .output {
            margin-top: 20px;
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            white-space: pre-wrap;
            overflow-x: auto;
        }

        .error {
            color: #f87171;
        }
    </style>

</head>

<body>

    <div class="container">
        <h1>BFHL Hierarchy Analyzer</h1>

        <label>Enter Data (JSON format):</label>
        <textarea id="input">
{
  "data": ["A->B", "A->C", "B->D"]
}
    </textarea>

        <button onclick="sendData()">Analyze</button>

        <div id="output" class="output"></div>
    </div>

    <script>
        async function sendData() {
            const outputDiv = document.getElementById("output");

            try {
                const inputText = document.getElementById("input").value;
                const jsonData = JSON.parse(inputText);

                outputDiv.innerHTML = "Loading...";

                const response = await fetch("https://bfhl-api-animesh.onrender.com/bfhl", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(jsonData)
                });

                const data = await response.json();

                outputDiv.innerHTML = formatJSON(data);

            } catch (error) {
                outputDiv.innerHTML = `<span class="error">Error: ${error.message}</span>`;
            }
        }

        function formatJSON(obj) {
            return `<pre>${JSON.stringify(obj, null, 2)}</pre>`;
        }
    </script>

</body>

</html>
